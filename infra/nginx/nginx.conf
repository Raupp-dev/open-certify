# infra/nginx/nginx.conf
# Proxy reverso para o monorepo Open Certify
# Arquitetura: frontend (Vite/React) + backend (Node.js monolito modular)

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream frontend {
        server frontend:5173;
    }

    upstream backend {
        server backend:3001;
    }

    # ── Servidor principal ────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Headers de segurança mínimos (dev)
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1; mode=block";

        # Proxy headers comuns (reutilizados abaixo)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts de proxy
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # ── API — todas as rotas do backend ───────────────────────────────────
        location /api/ {
            proxy_pass http://backend/api/;

            # Buffer de resposta
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }

        # ── Health check do Nginx ─────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── Frontend (Vite HMR + SPA fallback) ───────────────────────────────
        location / {
            proxy_pass http://frontend;

            # Suporte a WebSocket para Vite HMR em desenvolvimento
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
